server:
  port: 8080

spring:
  application:
    name: rtp-client

rtp:
  client:
    disruptor:
      ring-buffer-size: 65536
      thread-name: rtp-client-disruptor
    nats:
      servers: nats://localhost:4222
      connection-timeout-ms: 5000
      subject-prefix: ledger
      trace-subject: rtp.trace.v1
      balance-request-timeout-ms: 500
    trace:
      max-correlations: 5000
      max-events-per-correlation: 64
      retention-minutes: 30
      recent-limit: 100

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
