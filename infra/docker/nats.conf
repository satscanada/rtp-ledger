# NATS Server Configuration — sourced from gastbob40/nats-ui Docker example:
# curl -O https://raw.githubusercontent.com/gastbob40/nats-ui/main/docker/nats.conf
# Local stacks may ship a copy here for stable `docker compose up` offline.
#
# Optimized for NATS UI usage
#
# Accounts: nats-surveyor requires a system account ($SYS.REQ.* / statz). Anonymous app clients map to
# APP via authorization.no_auth_user. Surveyor uses user `sys` (SYS account). Dev-only passwords.

accounts {
  SYS: {
    users: [
      { user: sys, password: "rtpSysDev01" }
    ]
  }
  APP: {
    users: [
      { user: rtp, password: "rtpAppDev01" }
    ]
  }
}
system_account: SYS

# Map passwordless clients (rtp-client, rtp-server, NATS UI) to APP user `rtp`
no_auth_user: rtp

# Client port (TCP)
port: 4222

# HTTP monitoring — /varz, /connz, /healthz, etc. (maps to host in docker-compose)
http_port: 8222

# Enable debug logging (remove in production)
debug: true
trace: false

# WebSocket — bind all interfaces so Docker `-p 9222:9222` reaches the server
websocket {
  listen: "0.0.0.0:9222"
  no_tls: true
  compression: true
}

# JetStream configuration (present in upstream nats-ui image; rtp-ledger core path uses core NATS only).
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 1GB
  max_file_store: 10GB
}

# System limits
max_connections: 65536
max_payload: 4MB
max_pending: 64MB
